body:
  text: 會稽先賢傳孔愈字敬康嘗至吳興縣餘于亭見人籠龜於路愈求買放之於溪中龜行至水反顧愈及封此亭侯而禱印龜首回屈三鑄不正有似昔龜之顧靈德應感如此愈悟乃取而佩焉闞澤字德潤在母胞八月叱聲震外年十三夢見名字炳然在月中董崑字文通為大農帑丞坐無完席陳業字文理業兄度海傾命時依止者五六十人骨肉消爛而不可辨別業仰皇天誓后土曰聞親戚者必有異焉因割臂流血以灑骨上應時受血餘皆流去魏朗字少英為郡功曹佐正旦掾吏顧龕被裘以加朝服朗以裘非臣服龕不敬勑卒撒去龕恚而不聽朗右手鳴鼓左手撒裘以聞府君喜朗遂退龕以朗代之朗辭病不就賀劭為人美容止與人交久益敬之在官府常著襪希見其足陳修字奉先為豫章太守廳事薦編絶不改易郡風俗不整常卷坐席唯徐稚李贅數詣問乃待以殊禮焉
